name: Real API E2E

# Drives the built CLI against the live Yuque API on a schedule and on demand.
# The real-API paths are gated tests inside tests/e2e/cli.e2e.test.ts: without
# the YUQUE_E2E_TOKEN secret they skip and only the mock-server suite runs.
# Write-mode gates (YUQUE_E2E_WRITE / YUQUE_E2E_REPO_LIFECYCLE) are deliberately
# not wired into CI — see tests/e2e/README.md.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run e2e (real-API paths enabled when the secret exists)
        run: npm run test:e2e
        env:
          YUQUE_E2E: ${{ secrets.YUQUE_E2E_TOKEN != '' && '1' || '' }}
          YUQUE_E2E_TOKEN: ${{ secrets.YUQUE_E2E_TOKEN }}
          YUQUE_E2E_LOGIN: ${{ vars.YUQUE_E2E_LOGIN }}
          YUQUE_E2E_REPO: ${{ vars.YUQUE_E2E_REPO }}
